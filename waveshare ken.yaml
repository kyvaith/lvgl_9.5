        - if:
            condition:
              lambda: 'return x == "armed_away";'
            then:
              - lvgl.label.update:
                  id: alarm_panel_state_icon
                  text_color: color_green
                  text: "${shield_away_icon}"
              - lvgl.obj.update:
                  id: alarm_panel_state_icon_bg
                  bg_color: color_green

        - if:
            condition:
              lambda: 'return x == "armed_night";'
            then:
              - lvgl.label.update:
                  id: alarm_panel_state_icon
                  text_color: color_green
                  text: "${shield_night_icon}"
              - lvgl.obj.update:
                  id: alarm_panel_state_icon_bg
