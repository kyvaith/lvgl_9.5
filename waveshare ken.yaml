globals:
 
  - id: kb_phase
    type: int
    restore_value: no
    initial_value: "0"

  # Tick counter within the current phase (0 … kb_ticks_total-1)
  - id: kb_tick
    type: int
    restore_value: no
    initial_value: "0"

  # Total ticks per phase at 33 ms interval
  - id: kb_ticks_total
    type: int
    restore_value: no
    initial_value: "242"    # 8000 ms / 33 ms ≈ 242

  # FPS counters
  - id: kb_fps_count
