              - lvgl.widget.hide: alarm_panel_button_away
              - lvgl.widget.hide: alarm_panel_button_night
              - lvgl.widget.hide: alarm_panel_button_vacation             
              - lvgl.widget.show: alarm_panel_button_disarmed

        - if:
